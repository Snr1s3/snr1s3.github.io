name: Pull from mongo

on:  
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "mongo"
  cancel-in-progress: true

jobs:
  get-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run get-from-mogo.py
        id: mongo
        run: python portfolio/get-from-mogo.py
        continue-on-error: true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
      
      # Fallback to the GitHub script if the Mongo step fails.
      - name: Get Github Repos
        if: ${{ steps.mongo.outcome == 'failure' }}
        run: python portfolio/github_repos.py
