name: Push to mongo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "mongo"
  cancel-in-progress: true

jobs:
  push-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Runner public IP
        run: |
          echo "IP:"
          curl -s https://api.ipify.org && echo
      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run github_repos.py
        run: python portfolio/github_repos.py

      - name: Run push-to-mongo.py
        id: mongo
        run: python portfolio/push-to-mongo.py
        continue-on-error: true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
      
      # Fallback to the GitHub script if the Mongo step fails.
      - name: Fallback to the GitHub script
        if: ${{ steps.mongo.outcome == 'failure' }}
        run: python portfolio/github_repos.py

      - name: Set sync source
        id: sync_source
        run: |
          if [ "${{ steps.mongo.outcome }}" = "failure" ]; then
            echo "source=fallback" >> "$GITHUB_OUTPUT"
          else
            echo "source=mongo" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch notify event
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"mongo-sync-status","client_payload":{"source":"${{ steps.sync_source.outputs.source }}","mongo_outcome":"${{ steps.mongo.outcome }}","run_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}}'

